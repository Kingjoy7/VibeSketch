<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — VibeSketch Sample</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #ff6ec7;
    --orange: #ff9a3c;
    --yellow: #ffe066;
    --bg: #0a0a14;
    --surface: #12121f;
    --border: rgba(255,255,255,0.08);
    --text: #f0eeff;
    --muted: #8b8aaa;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.2;
    pointer-events: none;
  }
  .blob-1 { width:400px;height:400px;background:var(--pink);top:-100px;left:-100px; }
  .blob-2 { width:350px;height:350px;background:#4d9fff;bottom:-80px;right:-80px; }

  .card {
    background: rgba(18,18,31,0.85);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 40px;
    width: 420px;
    position: relative;
    z-index: 1;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    animation: fadeUp 0.6s ease;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(24px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .brand {
    text-align: center;
    margin-bottom: 36px;
  }
  .brand-icon {
    font-size: 36px;
    background: linear-gradient(135deg, var(--pink), var(--orange), var(--yellow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: block;
    margin-bottom: 8px;
  }
  .brand h1 {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--pink), var(--orange));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .brand p {
    color: var(--muted);
    font-size: 14px;
    margin-top: 4px;
  }
  .form-group {
    margin-bottom: 18px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 13px 16px;
    transition: all 0.2s;
  }
  input:focus {
    outline: none;
    border-color: var(--pink);
    background: rgba(255,110,199,0.06);
    box-shadow: 0 0 0 3px rgba(255,110,199,0.1);
  }
  .forgot {
    display: flex;
    justify-content: flex-end;
    margin-top: -10px;
    margin-bottom: 20px;
  }
  .forgot a {
    color: var(--pink);
    font-size: 12px;
    text-decoration: none;
    font-weight: 500;
  }
  .btn {
    width: 100%;
    background: linear-gradient(135deg, var(--pink), var(--orange), var(--yellow));
    border: none;
    border-radius: 12px;
    color: #1a0a00;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 20px;
  }
  .btn:hover { opacity:0.9; transform:translateY(-2px); box-shadow:0 8px 30px rgba(255,110,199,0.4); }
  .btn:active { transform:translateY(0); }
  .divider { display:flex;align-items:center;gap:12px;margin-bottom:20px; }
  .divider span { flex:1;height:1px;background:var(--border); }
  .divider p { color:var(--muted);font-size:12px; }
  .social-btn {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 12px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 10px;
  }
  .social-btn:hover { background:rgba(255,255,255,0.08); transform:translateY(-1px); }
  .signup {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    margin-top: 20px;
  }
  .signup a { color: var(--pink); text-decoration:none; font-weight:600; }
</style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="card">
    <div class="brand">
      <span class="brand-icon">✦</span>
      <h1>Welcome back</h1>
      <p>Sign in to your account</p>
    </div>

    <div class="form-group">
      <label>Email address</label>
      <input type="email" placeholder="you@example.com" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" placeholder="••••••••" />
    </div>

    <div class="forgot"><a href="#">Forgot password?</a></div>

    <button class="btn">Sign In →</button>

    <div class="divider">
      <span></span><p>or continue with</p><span></span>
    </div>

    <button class="social-btn">🔵 Continue with Google</button>
    <button class="social-btn">⬛ Continue with GitHub</button>

    <div class="signup">
      Don't have an account? <a href="#">Sign up free</a>
    </div>
  </div>
</body>
</html>
