<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0f0f1a;
    color: #f0eeff;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    height: 100vh;
    overflow-y: auto;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 800;
    font-size: 18px;
    background: linear-gradient(135deg, #ff6ec7, #ff9a3c, #ffe066);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .sub { font-size: 12px; color: #8b8aaa; }
  textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: #f0eeff;
    font-family: monospace;
    font-size: 11px;
    padding: 10px;
    height: 180px;
    resize: vertical;
  }
  textarea:focus { outline: none; border-color: #ff6ec7; }
  label { font-size: 12px; color: #8b8aaa; margin-bottom: 4px; display:block; }
  .btn {
    width: 100%;
    padding: 11px;
    border: none;
    border-radius: 10px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: linear-gradient(135deg, #a855f7, #ff6ec7, #ff9a3c); color: #1a0a00; }
  .btn-secondary { background: rgba(255,255,255,0.08); color: #f0eeff; border: 1px solid rgba(255,255,255,0.1); }
  .divider { height: 1px; background: rgba(255,255,255,0.08); }
  .status {
    font-size: 12px;
    color: #3cffd0;
    min-height: 18px;
    text-align: center;
  }
  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #8b8aaa;
  }
</style>
</head>
<body>

<div class="logo">✦ VibeSketch → Figma</div>
<p class="sub">Paste your generated HTML/CSS and export to Figma</p>

<div class="divider"></div>

<div>
  <label>Paste HTML/CSS code from VibeSketch</label>
  <textarea id="htmlInput" placeholder="Paste the generated HTML here..."></textarea>
</div>

<div>
  <label>Paste tokens.json (from VibeSketch Figma Export)</label>
  <textarea id="tokensInput" placeholder='{ "global": { "color-01": { "value": "#ff6ec7", "type": "color" } } }' style="height:100px"></textarea>
</div>

<button class="btn btn-primary" id="generateBtn">
  🎨 Create Figma Frames + Color Styles
</button>

<button class="btn btn-secondary" id="tokensOnlyBtn">
  🎨 Import Tokens Only
</button>

<div class="status" id="status"></div>

<button class="btn btn-secondary" id="closeBtn">Close Plugin</button>

<script>
  const status = document.getElementById('status');

  document.getElementById('generateBtn').addEventListener('click', () => {
    const html   = document.getElementById('htmlInput').value.trim();
    const tokRaw = document.getElementById('tokensInput').value.trim();
    if (!html) { status.textContent = '⚠ Please paste HTML first'; status.style.color = '#ff6060'; return; }

    let tokens = {};
    try { tokens = tokRaw ? JSON.parse(tokRaw) : {}; } catch(e) { status.textContent = '⚠ Invalid tokens JSON'; status.style.color = '#ff6060'; return; }

    status.textContent = 'Creating frames...';
    status.style.color = '#ffe066';
    parent.postMessage({ pluginMessage: { type: 'generate-frames', html, tokens } }, '*');
  });

  document.getElementById('tokensOnlyBtn').addEventListener('click', () => {
    const tokRaw = document.getElementById('tokensInput').value.trim();
    if (!tokRaw) { status.textContent = '⚠ Please paste tokens JSON first'; status.style.color = '#ff6060'; return; }
    let tokens = {};
    try { tokens = JSON.parse(tokRaw); } catch(e) { status.textContent = '⚠ Invalid JSON'; status.style.color = '#ff6060'; return; }
    status.textContent = 'Importing tokens...';
    status.style.color = '#ffe066';
    parent.postMessage({ pluginMessage: { type: 'import-tokens', tokens } }, '*');
  });

  document.getElementById('closeBtn').addEventListener('click', () => {
    parent.postMessage({ pluginMessage: { type: 'close' } }, '*');
  });

  window.onmessage = e => {
    const msg = e.data.pluginMessage;
    if (msg?.type === 'done') {
      status.textContent = '✦ ' + msg.text;
      status.style.color = '#3cffd0';
    }
  };
</script>
</body>
</html>
